<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harish Jaypal | Portfolio</title>

<style>
:root {
  --bg: #020617;
  --text: #ffffff;
  --card: rgba(255,255,255,0.05);
  --accent: #38bdf8;
}

.light-mode {
  --bg: #ffffff;
  --text: #000000;
  --card: #f1f5f9;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  transition: 0.4s;
}

/* Floating background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(56,189,248,0.1), transparent);
  animation: moveBg 10s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% {transform: translate(0,0);}
  50% {transform: translate(-50px,-50px);}
  100% {transform: translate(0,0);}
}

header {
  text-align: center;
  padding: 100px 20px;
}

h1 {
  font-size: 50px;
  color: var(--accent);
  text-shadow: 0 0 20px var(--accent);
}

#typing {
  font-size: 22px;
  margin-top: 10px;
}

/* Button */
.btn {
  margin-top: 25px;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: var(--accent);
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* Toggle */
.toggle {
  position: fixed;
  top: 20px;
  right: 20px;
}

/* Sections */
section {
  padding: 60px 20px;
  text-align: center;
}

/* Glass Card */
.card {
  margin: auto;
  max-width: 400px;
  padding: 25px;
  border-radius: 15px;
  background: var(--card);
  backdrop-filter: blur(10px);
  transition: 0.4s;
  opacity: 0;
  transform: translateY(40px);
}

.card.show {
  opacity: 1;
  transform: translateY(0);
}

footer {
  text-align: center;
  padding: 20px;
  opacity: 0.7;
}
</style>
</head>

<body>

<button class="btn toggle" onclick="toggleMode()">🌙 / ☀️</button>

<header>
  <h1>Hi, I'm Harish 👋</h1>
  <div id="typing"></div>
  <a href="https://github.com/HarishJaypal-PHPDEVELOPER" target="_blank">
    <button class="btn">GitHub</button>
  </a>
</header>

<section>
  <h2>🧠 About Me</h2>
  <div class="card reveal">
    <p>I build powerful web systems and aim to dominate AI development 🚀</p>
  </div>
</section>

<section>
  <h2>🛠️ Skills</h2>
  <div class="card reveal">
    <p>PHP | HTML | CSS | JavaScript | AI 🤖</p>
  </div>
</section>

<section>
  <h2>📫 Contact</h2>
  <div class="card reveal">
    <p>Email: harish@example.com</p>
  </div>
</section>

<footer>
  <p>© 2026 Harish Jaypal 🔥</p>
</footer>

<script>
// typing effect
let text = "Future AI Developer 🚀 | PHP Developer 💻";
let i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 40);
  }
}
typing();

// toggle mode
function toggleMode() {
  document.body.classList.toggle("light-mode");
}

// scroll reveal
const reveals = document.querySelectorAll(".reveal");

window.addEventListener("scroll", () => {
  reveals.forEach(el => {
    let top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      el.classList.add("show");
    }
  });
});
</script>

</body>
</html>
