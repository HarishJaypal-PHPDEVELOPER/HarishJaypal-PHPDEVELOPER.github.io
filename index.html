<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harish Jaypal</title>

<style>
:root {
  --bg:#020617;
  --text:#fff;
  --accent:#38bdf8;
  --card:rgba(255,255,255,0.05);
}

.light {
  --bg:#fff;
  --text:#000;
  --card:#f1f5f9;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.4s;
  overflow-x:hidden;
}

/* background glow */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(56,189,248,0.15),transparent);
  animation:bg 12s linear infinite;
  z-index:-1;
}
@keyframes bg{
  50%{transform:translate(-80px,-80px);}
}

/* buttons */
.btn{
  padding:12px 25px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  margin:10px;
  font-weight:bold;
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:black;
  position:relative;
  overflow:hidden;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* ripple */
.btn::after{
  content:"";
  position:absolute;
  width:0;
  height:0;
  background:rgba(255,255,255,0.5);
  border-radius:50%;
  transform:translate(-50%,-50%);
  top:50%;
  left:50%;
  opacity:0;
}
.btn:active::after{
  width:200px;
  height:200px;
  opacity:1;
  transition:.4s;
}

/* toggle */
.toggle{
  position:fixed;
  top:20px;
  right:20px;
}

/* header */
header{
  text-align:center;
  padding:120px 20px;
}

h1{
  font-size:50px;
  color:var(--accent);
  text-shadow:0 0 20px var(--accent);
}

/* typing */
#typing{
  margin-top:10px;
  font-size:20px;
}

/* section */
section{
  padding:70px 20px;
  text-align:center;
}

/* card */
.card{
  max-width:450px;
  margin:auto;
  padding:25px;
  border-radius:15px;
  background:var(--card);
  backdrop-filter:blur(10px);
  opacity:0;
  transform:translateY(50px);
  transition:.5s;
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

/* scroll top */
#topBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  display:none;
}

/* footer */
footer{
  text-align:center;
  padding:20px;
  opacity:.6;
}
</style>
</head>

<body>

<button class="btn toggle" onclick="toggleMode()">🌙 / ☀️</button>

<header>
  <h1>Harish Jaypal ⚡</h1>
  <div id="typing"></div>

  <!-- NEW BUTTONS -->
  <div>
    <button class="btn" onclick="scrollToSection()">🚀 Explore</button>
    <a href="https://github.com/HarishJaypal-PHPDEVELOPER" target="_blank">
      <button class="btn">💻 GitHub</button>
    </a>
    <button class="btn" onclick="downloadResume()">📄 Resume</button>
  </div>
</header>

<section id="about">
  <h2>🧠 About</h2>
  <div class="card reveal">
    <p>I build powerful systems and future AI tools 🚀</p>
  </div>
</section>

<section>
  <h2>🛠️ Skills</h2>
  <div class="card reveal">
    <p>PHP | HTML | CSS | JavaScript | AI 🤖</p>
  </div>
</section>

<section>
  <h2>📫 Contact</h2>
  <div class="card reveal">
    <p>Email: harish@example.com</p>
    <button class="btn">📩 Message Me</button>
  </div>
</section>

<button class="btn" id="topBtn" onclick="topFunction()">⬆ Top</button>

<footer>
  <p>© 2026 ByteRudra 💀🔥</p>
</footer>

<script>
// typing
let text="Future AI Developer 🚀 | Legend Mode 💀";
let i=0;
function typing(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typing,40);
  }
}
typing();

// toggle
function toggleMode(){
  document.body.classList.toggle("light");
}

// scroll reveal
const cards=document.querySelectorAll(".reveal");
window.addEventListener("scroll",()=>{
  cards.forEach(el=>{
    if(el.getBoundingClientRect().top < window.innerHeight-100){
      el.classList.add("show");
    }
  });

  // show top button
  if(window.scrollY>200){
    document.getElementById("topBtn").style.display="block";
  } else {
    document.getElementById("topBtn").style.display="none";
  }
});

// scroll to about
function scrollToSection(){
  document.getElementById("about").scrollIntoView({behavior:"smooth"});
}

// scroll top
function topFunction(){
  window.scrollTo({top:0,behavior:"smooth"});
}

// fake resume download
function downloadResume(){
  alert("Resume coming soon 😎");
}
</script>

</body>
</html>
