<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harish Jaypal | Portfolio</title>

<style>
:root {
  --bg: #0f172a;
  --text: #ffffff;
  --card: rgba(255,255,255,0.05);
}

.light-mode {
  --bg: #ffffff;
  --text: #000000;
  --card: #f1f5f9;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  text-align: center;
  transition: 0.3s;
}

header {
  padding: 80px 20px;
}

h1 {
  font-size: 45px;
  color: #38bdf8;
}

#typing {
  font-size: 20px;
  margin-top: 10px;
}

.btn {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 30px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
  font-weight: bold;
}

.toggle {
  position: fixed;
  top: 20px;
  right: 20px;
}

section {
  padding: 50px 20px;
}

.card {
  background: var(--card);
  padding: 20px;
  margin: 10px auto;
  border-radius: 15px;
  width: 250px;
}

footer {
  padding: 20px;
}
</style>
</head>

<body>

<button class="btn toggle" onclick="toggleMode()">🌙 / ☀️</button>

<header>
  <h1>Hi, I'm Harish 👋</h1>
  <h2 id="typing"></h2>
  <a href="https://github.com/HarishJaypal-PHPDEVELOPER" target="_blank">
    <button class="btn">Visit GitHub</button>
  </a>
</header>

<section>
  <h2>🧠 About Me</h2>
  <div class="card">
    <p>I am a passionate developer focused on AI, web development and building powerful systems 🚀</p>
  </div>
</section>

<section>
  <h2>🛠️ Skills</h2>
  <div class="card">
    <p>PHP | HTML | CSS | JavaScript | Learning AI 🤖</p>
  </div>
</section>

<section>
  <h2>📫 Contact</h2>
  <div class="card">
    <p>Email: harish@example.com</p>
  </div>
</section>

<footer>
  <p>© 2026 Harish Jaypal 🔥</p>
</footer>

<script>
// typing effect
let text = "Future AI Developer 🚀";
let i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 40);
  }
}
typing();

// dark light toggle
function toggleMode() {
  document.body.classList.toggle("light-mode");
}
</script>

</body>
</html>
