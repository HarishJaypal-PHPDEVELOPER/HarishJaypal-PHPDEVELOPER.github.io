<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harish Jaypal | ULTRA LEGEND</title>

<style>
:root {
  --bg: #020617;
  --text: #ffffff;
  --accent: #38bdf8;
  --card: rgba(255,255,255,0.05);
}

.light {
  --bg: #ffffff;
  --text: #000000;
  --card: #f1f5f9;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  transition: 0.4s;
}

/* Animated background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at center, rgba(56,189,248,0.15), transparent);
  animation: bgMove 12s infinite linear;
  z-index: -1;
}

@keyframes bgMove {
  0% {transform: translate(0,0);}
  50% {transform: translate(-100px,-100px);}
  100% {transform: translate(0,0);}
}

/* Mouse glow */
.cursor {
  position: fixed;
  width: 20px;
  height: 20px;
  background: var(--accent);
  border-radius: 50%;
  pointer-events: none;
  mix-blend-mode: screen;
  transform: translate(-50%, -50%);
}

/* Header */
header {
  text-align: center;
  padding: 120px 20px;
}

h1 {
  font-size: 55px;
  color: var(--accent);
  text-shadow: 0 0 25px var(--accent);
}

#typing {
  font-size: 22px;
  margin-top: 10px;
  opacity: 0.8;
}

/* Buttons */
.btn {
  margin-top: 30px;
  padding: 12px 28px;
  border-radius: 30px;
  border: none;
  background: var(--accent);
  color: black;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px var(--accent);
}

/* Toggle */
.toggle {
  position: fixed;
  top: 20px;
  right: 20px;
}

/* Section */
section {
  padding: 70px 20px;
  text-align: center;
}

/* Card */
.card {
  max-width: 450px;
  margin: auto;
  padding: 30px;
  border-radius: 20px;
  background: var(--card);
  backdrop-filter: blur(15px);
  opacity: 0;
  transform: translateY(60px);
  transition: 0.5s;
}

.card.show {
  opacity: 1;
  transform: translateY(0);
}

/* Footer */
footer {
  padding: 20px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<button class="btn toggle" onclick="toggleMode()">🌙 / ☀️</button>

<header>
  <h1>Harish Jaypal ⚡</h1>
  <div id="typing"></div>
  <a href="https://github.com/HarishJaypal-PHPDEVELOPER" target="_blank">
    <button class="btn">Enter My World 🌍</button>
  </a>
</header>

<section>
  <h2>🧠 About</h2>
  <div class="card reveal">
    <p>I don’t just code… I build systems that think 🚀</p>
  </div>
</section>

<section>
  <h2>🛠️ Skills</h2>
  <div class="card reveal">
    <p>PHP | HTML | CSS | JavaScript | AI 🤖</p>
  </div>
</section>

<section>
  <h2>📫 Contact</h2>
  <div class="card reveal">
    <p>Email: harish@example.com</p>
  </div>
</section>

<footer>
  <p>© 2026 ByteRudra 💀🔥</p>
</footer>

<script>
// typing
let text = "Future AI Developer 🚀 | System Builder 💻";
let i = 0;
function typing(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 40);
  }
}
typing();

// toggle
function toggleMode(){
  document.body.classList.toggle("light");
}

// reveal
const cards = document.querySelectorAll(".reveal");
window.addEventListener("scroll", ()=>{
  cards.forEach(el=>{
    let top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add("show");
    }
  });
});

// cursor glow
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
