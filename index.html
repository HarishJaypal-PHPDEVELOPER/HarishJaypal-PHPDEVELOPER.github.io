<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harish Jaypal | Portfolio</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  text-align: center;
}

header {
  padding: 80px 20px;
}

h1 {
  font-size: 45px;
  color: #38bdf8;
}

#typing {
  font-size: 20px;
  color: #cbd5f5;
  margin-top: 10px;
}

.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 12px 25px;
  background: #38bdf8;
  color: black;
  text-decoration: none;
  border-radius: 30px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #0ea5e9;
  transform: scale(1.05);
}

section {
  padding: 50px 20px;
}

.card-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 20px;
  margin: 15px;
  border-radius: 15px;
  width: 250px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 20px rgba(56,189,248,0.3);
}

footer {
  padding: 20px;
  background: #020617;
  font-size: 14px;
}

/* Glow effect */
.glow {
  text-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8;
}
</style>
</head>

<body>

<header>
  <h1 class="glow">Hi, I'm Harish 👋</h1>
  <h2 id="typing"></h2>
  <a href="https://github.com/HarishJaypal-PHPDEVELOPER" target="_blank" class="btn">Visit GitHub</a>
</header>

<section>
  <h2>🚀 My Projects</h2>

  <div class="card-container">

    <a href="https://github.com/HarishJaypal-PHPDEVELOPER" target="_blank">
      <div class="card">
        <h3>PayBolt 💳</h3>
        <p>Next-gen payment app</p>
      </div>
    </a>

    <a href="https://github.com/HarishJaypal-PHPDEVELOPER" target="_blank">
      <div class="card">
        <h3>HarishCyborg 🤖</h3>
        <p>AI powered system</p>
      </div>
    </a>

  </div>
</section>

<section>
  <h2>🛠️ Skills</h2>
  <p>PHP | HTML | CSS | JavaScript | Learning AI 🤖</p>
</section>

<section>
  <h2>📫 Contact</h2>
  <p>Email: harish@example.com</p>
</section>

<footer>
  <p>© 2026 Harish Jaypal | Built with passion 🔥</p>
</footer>

<script>
let text = "Future AI Developer 🚀 | PHP Developer 💻";
let i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 40);
  }
}
typing();
</script>

</body>
</html>
